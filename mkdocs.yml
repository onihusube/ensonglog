site_name: エロゲ・ノベルゲームの関連曲のメモ

repo_name: onihusube/ensonglog
repo_url: https://github.com/onihusube/ensonglog
edit_uri: ""
site_url: https://onihusube.github.io/ensonglog/

nav:
    - 🏡 Home :
      - 🏡 トップページ: index.md
      - 🔎 サイト内検索: top/search.md
      - 🖋 情報の追記・修正等について: top/contribution.md
      - ℹ️ サイト内での表記について: top/explanatory_note.md
    - 🎵 楽曲:
      - 2026年楽曲リスト : 2026/楽曲.md
      - 2025年楽曲リスト : 2025/楽曲.md
      - 2024年楽曲リスト : 2024/楽曲.md
      - 2023年楽曲リスト : 2023/楽曲.md
      - 2022年以前 : before/楽曲.md

    - 💿 音源:
      - 2026年音源リスト : 2026/音源.md
      - 2025年音源リスト : 2025/音源.md
      - 2024年音源リスト : 2024/音源.md
      - 2023年音源リスト : 2023/音源.md
      - 2022年音源リスト : 2022/音源.md
      - 2021年音源リスト : 2021/音源.md
      - 2020年音源リスト : 2020/音源.md
      - 2019年音源リスト : 2019/音源.md
      - 2018年音源リスト : 2018/音源.md
      - 2017年以前 : before/音源.md

theme:
  name: 'material'
  language: ja
  palette:
    - scheme: default
      primary: purple
      accent: pink
      toggle:
        icon:  material/toggle-switch-off-outline
        name: ダークモードに切り替えます。
    - scheme: slate
      primary: grey
      accent: orange
      toggle:
        icon: material/toggle-switch
        name: ライトモードに切り替えます。
  features:
    - header.autohide
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - navigation.top

plugins: []

markdown_extensions:
  - tables
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.tasklist:  
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - javascripts/tablesort.js
  - javascripts/external-links.js

extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-XJ5HE1HH9Q